<div class="main-container">
  <!-- Sidebar -->
  <app-aside></app-aside>

  <!-- Sections -->
  <div class="main-content">

    <!-- HOME -->
    <section
      id="home"
      class="home section"
      [class.active]="isActive('home')"
      [class.back-section]="isBack('home')"
    >
      <div class="container">
        <div class="row">
          <app-home></app-home>
        </div>
      </div>
    </section>

    <!-- ABOUT -->
    <section
      id="about"
      class="about section"
      [class.active]="isActive('about')"
      [class.back-section]="isBack('about')"
    >
      <app-about></app-about>
    </section>

    <!-- SERVICES -->
    <section
      id="services"
      class="service section"
      [class.active]="isActive('services')"
      [class.back-section]="isBack('services')"
    >
      <app-services></app-services>
    </section>
    <!-- Certificate -->
    <section
      id="certificate"
      class="service section"
      [class.active]="isActive('certificate')"
      [class.back-section]="isBack('certificate')"
    >
      <app-certificates></app-certificates>
    </section>

    <!-- PORTFOLIO -->
    <section
      id="portfolio"
      class="portfolio section"
      [class.active]="isActive('portfolio')"
      [class.back-section]="isBack('portfolio')"
    >
      <app-portfolio></app-portfolio>
    </section>

    <!-- CONTACT -->
    <section
      id="contact"
      class="contact section"
      [class.active]="isActive('contact')"
      [class.back-section]="isBack('contact')"
    >
      <app-contact></app-contact>
    </section>

  </div>
</div>

<!-- Style Switcher -->
<app-style-switcher></app-style-switcher>
