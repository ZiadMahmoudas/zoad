<!-- ===================== CERTIFICATES SECTION ===================== -->
<div class="container">

  <!-- Section Title -->
  <div class="row">
    <div class="section-title padd-15">
      <h2>Certificates</h2>
    </div>
  </div>

  <!-- Heading -->
  <div class="row">
    <div class="certificates-heading padd-15">
      <h2>My Credentials:</h2>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="row">
    <div class="cert-filters padd-15">
      <ul class="filter-list">
        <li
          *ngFor="let filter of filters"
          class="filter-item"
          [class.active]="activeFilter === filter"
          (click)="setFilter(filter)"
          [attr.data-filter]="filter.toLowerCase()"
        >
          <span class="filter-label">{{ filter }}</span>
          <span class="filter-badge">{{ getCount(filter) }}</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- Cards Grid -->
  <div class="row" [@staggerIn]="filteredCertificates.length">
    <div
      class="cert-item padd-15"
      *ngFor="let cert of filteredCertificates;"
    >
      <!-- Flip Card Wrapper -->
      <div class="flip-card">
        <div class="flip-card-inner">

          <!-- ── FRONT ── -->
          <div class="flip-card-front">
            <!-- Category Badge -->
            <div class="cert-badge" [ngClass]="getCategoryColor(cert.category)">
              <i [class]="getCategoryIcon(cert.category)"></i>
              {{ cert.category }}
            </div>

            <!-- Certificate Image -->
            <div class="cert-img-wrap">
              <img
                [src]="cert.img"
                [alt]="cert.title"
                loading="lazy"
              />
              <!-- Shimmer overlay on hover -->
              <div class="shimmer"></div>
            </div>

            <!-- Hover hint -->
            <div class="flip-hint">
              <i class="fas fa-sync-alt"></i>
              <span>Hover to see details</span>
            </div>
          </div>

          <!-- ── BACK ── -->
     <div class="flip-card-back">
  <div class="back-accent"></div>

  <div class="back-icon" [ngClass]="getCategoryColor(cert.category)">
    <i [class]="getCategoryIcon(cert.category)"></i>
  </div>

  <div class="back-content">
    <h3 class="back-title">{{ cert.title }}</h3>

    <div class="back-meta">
      <div class="meta-row">
        <i class="fas fa-building"></i>
        <span>{{ cert.issuer }}</span>
      </div>
      <div class="meta-row">
        <i class="fas fa-calendar-alt"></i>
        <span>{{ cert.date }}</span>
      </div>
      <div class="meta-row">
        <i [class]="getCategoryIcon(cert.category)"></i>
        <span>{{ cert.category }}</span>
      </div>
    </div>
  </div>

  <div class="card-actions" style="display: flex; flex-direction: column; gap: 10px; width: 100%; align-items: center; ">
    
    <a *ngIf="cert.credentialUrl" [href]="cert.credentialUrl" target="_blank" rel="noopener noreferrer" class="verify-btn">
      <i class="fas fa-external-link-alt"></i> Verify Credential
    </a>

    <span *ngIf="!cert.credentialUrl" class="no-link">
      <i class="fas fa-lock"></i> Local Certificate
    </span>

    <button (click)="downloadImage(cert.img, cert.title)" class="download-btn">
      <i class="fas fa-download"></i> Download
    </button>

  </div>
</div>

        </div><!-- /flip-card-inner -->
      </div><!-- /flip-card -->
    </div>
  </div>

  <!-- Empty state -->
  <div class="row" *ngIf="filteredCertificates.length === 0">
    <div class="empty-state padd-15">
      <i class="fas fa-folder-open"></i>
      <p>No certificates in this category yet.</p>
    </div>
  </div>

</div>
