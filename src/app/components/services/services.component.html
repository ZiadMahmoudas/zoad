<div class="container">
  <div class="row">
    <div class="section-title padd-15">
      <h2>Services</h2>
    </div>
  </div>

  <div class="row">
    <div class="service-item padd-15" *ngFor="let service of services">
      <div class="service-item-inner">
        <div class="icon">
          <i [class]="service.icon + ' fa'"></i>
        </div>
        <h4>{{ service.title }}</h4>
        <p>{{ service.description }}</p>
      </div>
    </div>
  </div>
</div>
